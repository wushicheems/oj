name: Deploy HOJ Frontend

on:
  push:
    branches: [ main ]  # Runs only when pushing to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - uses: actions/checkout@v4
      
      # Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      
      # Install and build (assuming HOJ frontend is in hoj-vue/)
      - name: Build frontend
        run: |
          cd hoj-vue
          npm install
          npm run build
          
      # Deploy to GitHub Pages
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hoj-vue/dist  # Path to built files
          keep_files: true  # Keep existing files in gh-pages branch
